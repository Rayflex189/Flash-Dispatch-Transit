{% extends 'base.html' %}

{% block title %}Track Package{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto bg-white p-8 rounded-lg shadow">
    <h2 class="text-2xl font-bold mb-6">Track Your Package</h2>
    <div class="flex">
        <input type="text" 
               placeholder="Enter tracking number" 
               class="flex-1 px-4 py-2 border rounded-l-lg focus:outline-none focus:ring-2 focus:ring-blue-600">
        <button class="bg-blue-600 text-white px-6 py-2 rounded-r-lg hover:bg-blue-700">
            Track
        </button>
    </div>
    <div id="tracking-result" class="mt-6"></div>
</div>

<script>
document.querySelector('button').addEventListener('click', function() {
    const trackingNumber = document.querySelector('input').value;
    if (trackingNumber) {
        alert('Tracking functionality will be implemented soon!');
    }
});
</script>
{% endblock %}
