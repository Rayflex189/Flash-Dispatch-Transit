{% extends 'base.html' %}

{% block title %}Create Shipment{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto bg-white p-8 rounded-lg shadow">
    <h2 class="text-2xl font-bold mb-6">Create New Shipment</h2>
    <form method="post">
        {% csrf_token %}
        <p class="text-gray-600">Shipment form will go here</p>
        <button type="submit" class="mt-4 bg-blue-600 text-white px-6 py-2 rounded-lg">Create</button>
    </form>
</div>
{% endblock %}
